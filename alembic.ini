[alembic]
# Path to migration scripts directory
script_location = backend/alembic

# Database URL - This is dynamically set by backend/alembic/env.py
# from shared.config.settings, so this is just a placeholder
# The actual URL is set at runtime based on environment variables
sqlalchemy.url = postgresql://user:password@localhost:5432/ai_discovery

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S



