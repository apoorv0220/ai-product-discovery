version: '3.8'

services:
  # Search Service
  search-service:
    build:
      context: ./backend
      dockerfile: search-service/Dockerfile
    container_name: discovery_search_service
    ports:
      - "7001:8000"
    environment:
      - DATABASE_URL=postgresql://ai_discovery:%3EcTn2%2BE7%7B1j9@host.docker.internal:5432/ai_discovery
      - REDIS_URL=redis://host.docker.internal:6379/0
      - SEARCH_SERVICE_HOST=0.0.0.0
      - SEARCH_SERVICE_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-here}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - discovery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"

  # Recommendation Service
  recommendation-service:
    build:
      context: ./backend
      dockerfile: recommendation-service/Dockerfile
    container_name: discovery_recommendation_service
    ports:
      - "7002:8000"
    environment:
      - DATABASE_URL=postgresql://ai_discovery:%3EcTn2%2BE7%7B1j9@host.docker.internal:5432/ai_discovery
      - REDIS_URL=redis://host.docker.internal:6379/0
      - RECOMMENDATION_SERVICE_HOST=0.0.0.0
      - RECOMMENDATION_SERVICE_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-here}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - discovery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"

  # Analytics Service
  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    container_name: discovery_analytics_service
    ports:
      - "7004:8000"
    environment:
      - DATABASE_URL=postgresql://ai_discovery:%3EcTn2%2BE7%7B1j9@host.docker.internal:5432/ai_discovery
      - REDIS_URL=redis://host.docker.internal:6379/0
      - ANALYTICS_SERVICE_HOST=0.0.0.0
      - ANALYTICS_SERVICE_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-here}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - discovery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"

  # Shopping Assistant Service
  shopping-assistant:
    build:
      context: ./backend
      dockerfile: shopping-assistant/Dockerfile
    container_name: discovery_shopping_assistant
    ports:
      - "7005:8000"
    environment:
      - DATABASE_URL=postgresql://ai_discovery:%3EcTn2%2BE7%7B1j9@host.docker.internal:5432/ai_discovery
      - REDIS_URL=redis://host.docker.internal:6379/0
      - SHOPPING_ASSISTANT_HOST=0.0.0.0
      - SHOPPING_ASSISTANT_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-here}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - discovery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
    container_name: discovery_celery_worker
    command: celery -A shared.celery.app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://ai_discovery:%3EcTn2%2BE7%7B1j9@host.docker.internal:5432/ai_discovery
      - CELERY_BROKER_URL=redis://host.docker.internal:6379/1
      - CELERY_RESULT_BACKEND=redis://host.docker.internal:6379/2
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - discovery-network
    depends_on:
      - search-service
      - recommendation-service
      - analytics-service
      - shopping-assistant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"

  # Celery Flower (monitoring)
  celery-flower:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
    container_name: discovery_celery_flower
    command: celery -A shared.celery.app flower --port=5555
    ports:
      - "7006:5555"
    environment:
      - CELERY_BROKER_URL=redis://host.docker.internal:6379/1
      - CELERY_RESULT_BACKEND=redis://host.docker.internal:6379/2
      - FLOWER_BASIC_AUTH=admin:${FLOWER_PASSWORD:-admin123}
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - discovery-network
    depends_on:
      - celery-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "bridge"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: discovery_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/shared-server.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - discovery-network
    depends_on:
      - search-service
      - recommendation-service
      - analytics-service
      - shopping-assistant

networks:
  discovery-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  app_data:
    driver: local