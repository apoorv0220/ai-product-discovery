# AI Product Discovery Suite - Nginx Configuration

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=50r/s;

# Upstream servers
upstream search_service {
    server search-service:8001 max_fails=3 fail_timeout=30s;
}

upstream recommendation_service {
    server recommendation-service:8002 max_fails=3 fail_timeout=30s;
}

upstream analytics_service {
    server analytics-service:8004 max_fails=3 fail_timeout=30s;
}

upstream shopping_assistant {
    server shopping-assistant:8005 max_fails=3 fail_timeout=30s;
}

# Main server block
server {
    listen 80;
    server_name api.yourdomain.com localhost;
    
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # CORS headers for API
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With" always;
    add_header Access-Control-Max-Age 86400 always;
    
    # Handle preflight requests
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 200;
    }
    
    # Logging
    access_log /var/log/nginx/discovery-api.access.log;
    error_log /var/log/nginx/discovery-api.error.log;
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Search Service
    location /api/v1/search {
        limit_req zone=search_limit burst=20 nodelay;
        
        proxy_pass http://search_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Autocomplete endpoint (higher rate limit)
    location /api/v1/autocomplete {
        limit_req zone=search_limit burst=50 nodelay;
        
        proxy_pass http://search_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        
        # Enable caching for autocomplete
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
    }
    
    # Recommendation Service
    location /api/v1/recommendations {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://recommendation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Analytics Service
    location /api/v1/events {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://analytics_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 3s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        
        # For tracking endpoints, we want minimal latency
        proxy_buffering off;
    }
    
    # Analytics Dashboard
    location /api/v1/dashboard {
        limit_req zone=api_limit burst=5 nodelay;
        
        proxy_pass http://analytics_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Shopping Assistant
    location /api/v1/chat {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://shopping_assistant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Support for streaming responses
        proxy_buffering off;
        proxy_cache off;
    }
    
    # Shopping Assistant Sessions
    location /api/v1/sessions {
        limit_req zone=api_limit burst=5 nodelay;
        
        proxy_pass http://shopping_assistant;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Block access to internal health endpoints
    location ~ /health/ {
        deny all;
        return 403;
    }
    
    # Default fallback
    location / {
        return 404 '{"error": "API endpoint not found"}';
        add_header Content-Type application/json;
    }
}

# SSL/HTTPS server block (for production)
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;
    
    # SSL configuration
    ssl_certificate /etc/nginx/ssl/discovery.crt;
    ssl_certificate_key /etc/nginx/ssl/discovery.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Include all the location blocks from the HTTP server
    include /etc/nginx/conf.d/discovery-locations.conf;
}