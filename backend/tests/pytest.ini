[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command line options
addopts = 
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
    -p no:warnings

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require services)
    regression: Regression tests (prevent breaking changes)
    slow: Slow tests (skip in quick runs)
    requires_redis: Requires Redis connection
    requires_elasticsearch: Requires Elasticsearch
    requires_qdrant: Requires Qdrant
    performance: Performance/load tests

# Async configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage configuration (use with --cov)
# Example: pytest --cov=backend --cov-report=html

