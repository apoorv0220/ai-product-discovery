services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai_discovery_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-7010}:5432"  # Explicit port mapping for local access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: Database schema is now managed by Alembic migrations
      # Run 'alembic upgrade head' after starting the postgres container
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_discovery"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: ai_discovery_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-7011}:6379"  # Explicit port mapping for local access
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Elasticsearch (for search indexing)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ai_discovery_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    ports:
      - "${ELASTICSEARCH_PORT:-7020}:9200"  # Explicit port mapping for local access
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Qdrant (for vector search)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_discovery_qdrant
    ports:
      - "${QDRANT_PORT:-7021}:6333"  # Explicit port mapping for local access
      - "${QDRANT_GRPC_PORT:-7022}:6334"  # Explicit port mapping for local access
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Worker (Development Infrastructure)
  celery-worker:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
      args:
        BASE_IMAGE: discovery-base:latest
    container_name: ai_discovery_celery_worker
    ports:
      - "5678:5678"  # Expose for development debugging
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A shared.celery.app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4} --queues=analytics,celery --max-tasks-per-child=1000
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery.app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat (Development Infrastructure)
  celery-beat:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
      args:
        BASE_IMAGE: discovery-base:latest
    container_name: ai_discovery_celery_beat
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A shared.celery.app beat --loglevel=info --pidfile=/tmp/celerybeat.pid
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/celerybeat.pid"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Flower (Development Infrastructure)
  flower:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
      args:
        BASE_IMAGE: discovery-base:latest
    container_name: ai_discovery_flower
    ports:
      - "5555:5555"  # Expose Flower UI for development
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    command: celery -A shared.celery.app flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH:-admin:admin}
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u ${FLOWER_BASIC_AUTH:-admin:admin} http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  ai-discovery:
    driver: bridge
    name: ai_discovery_network