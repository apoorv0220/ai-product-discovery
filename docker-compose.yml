version: '3.8'

services:
  # Search Service
  search-service:
    build:
      context: ./backend
      dockerfile: search-service/Dockerfile
    container_name: ai_discovery_search
    ports:
      - "${SEARCH_SERVICE_EXTERNAL_PORT:-7001}:${SEARCH_SERVICE_PORT:-8000}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SEARCH_SERVICE_HOST=0.0.0.0
      - SEARCH_SERVICE_PORT=${SEARCH_SERVICE_PORT:-8000}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - WEAVIATE_URL=${WEAVIATE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SEARCH_SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Recommendation Service
  recommendation-service:
    build:
      context: ./backend
      dockerfile: recommendation-service/Dockerfile
    container_name: ai_discovery_recommendation
    ports:
      - "${RECOMMENDATION_SERVICE_EXTERNAL_PORT:-7002}:${RECOMMENDATION_SERVICE_PORT:-8000}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RECOMMENDATION_SERVICE_HOST=0.0.0.0
      - RECOMMENDATION_SERVICE_PORT=${RECOMMENDATION_SERVICE_PORT:-8000}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - WEAVIATE_URL=${WEAVIATE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${RECOMMENDATION_SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Analytics Service
  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    container_name: ai_discovery_analytics
    ports:
      - "${ANALYTICS_SERVICE_EXTERNAL_PORT:-7004}:${ANALYTICS_SERVICE_PORT:-8000}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ANALYTICS_SERVICE_HOST=0.0.0.0
      - ANALYTICS_SERVICE_PORT=${ANALYTICS_SERVICE_PORT:-8000}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - WEAVIATE_URL=${WEAVIATE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ANALYTICS_SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Shopping Assistant Service
  shopping-assistant:
    build:
      context: ./backend
      dockerfile: shopping-assistant/Dockerfile
    container_name: ai_discovery_assistant
    ports:
      - "${SHOPPING_ASSISTANT_EXTERNAL_PORT:-7005}:${SHOPPING_ASSISTANT_PORT:-8000}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SHOPPING_ASSISTANT_HOST=0.0.0.0
      - SHOPPING_ASSISTANT_PORT=${SHOPPING_ASSISTANT_PORT:-8000}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SHOPPING_ASSISTANT_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
    container_name: ai_discovery_celery
    command: celery -A shared.celery.app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - WEAVIATE_URL=${WEAVIATE_URL}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      - search-service
      - recommendation-service
      - analytics-service

  # Celery Flower (monitoring)
  celery-flower:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
    container_name: ai_discovery_flower
    command: celery -A shared.celery.app flower --port=5555
    ports:
      - "${FLOWER_EXTERNAL_PORT:-7006}:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      - celery-worker

  # Elasticsearch (for search indexing)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ai_discovery_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ELASTICSEARCH_EXTERNAL_PORT:-9200}:9200"
      - "9300:9300"
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Weaviate (for vector search)
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.5
    container_name: ai_discovery_weaviate
    ports:
      - "${WEAVIATE_EXTERNAL_PORT:-8065}:8065"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: 'text2vec-openai,qna-openai'
      CLUSTER_HOSTNAME: 'node1'
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8065/v1/meta", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  ai-discovery:
    driver: bridge
    name: ai_discovery_network