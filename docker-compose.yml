services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai_discovery_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-7010}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_discovery"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: ai_discovery_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_EXTERNAL_PORT:-7011}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Search Service
  search-service:
    build:
      context: ./backend
      dockerfile: search-service/Dockerfile
    container_name: ai_discovery_search
    ports:
      - "${SEARCH_SERVICE_EXTERNAL_PORT:-7001}:${SEARCH_SERVICE_PORT:-7099}"
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai_user:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SEARCH_SERVICE_HOST=0.0.0.0
      - SEARCH_SERVICE_PORT=${SEARCH_SERVICE_PORT:-7099}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:8080"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7099/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Recommendation Service
  recommendation-service:
    build:
      context: ./backend
      dockerfile: recommendation-service/Dockerfile
    container_name: ai_discovery_recommendation
    ports:
      - "${RECOMMENDATION_SERVICE_EXTERNAL_PORT:-7002}:${RECOMMENDATION_SERVICE_PORT:-7099}"
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai_user:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - RECOMMENDATION_SERVICE_HOST=0.0.0.0
      - RECOMMENDATION_SERVICE_PORT=${RECOMMENDATION_SERVICE_PORT:-7099}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:8080"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7099/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Analytics Service
  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    container_name: ai_discovery_analytics
    ports:
      - "${ANALYTICS_SERVICE_EXTERNAL_PORT:-7004}:${ANALYTICS_SERVICE_PORT:-7099}"
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai_user:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ANALYTICS_SERVICE_HOST=0.0.0.0
      - ANALYTICS_SERVICE_PORT=${ANALYTICS_SERVICE_PORT:-7099}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:8080"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7099/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Shopping Assistant Service
  shopping-assistant:
    build:
      context: ./backend
      dockerfile: shopping-assistant/Dockerfile
    container_name: ai_discovery_assistant
    ports:
      - "${SHOPPING_ASSISTANT_EXTERNAL_PORT:-7005}:${SHOPPING_ASSISTANT_PORT:-7099}"
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai_user:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SHOPPING_ASSISTANT_HOST=0.0.0.0
      - SHOPPING_ASSISTANT_PORT=${SHOPPING_ASSISTANT_PORT:-7099}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:8080"]}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7099/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: shared/Dockerfile.celery
    container_name: ai_discovery_celery_worker
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
      - DATABASE_URL=postgresql+asyncpg://ai_user:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    restart: unless-stopped
    networks:
      - ai-discovery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A shared.celery.app worker --loglevel=info


  # Elasticsearch (for search indexing)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ai_discovery_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ELASTICSEARCH_EXTERNAL_PORT:-9200}:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Qdrant (for vector search)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_discovery_qdrant
    ports:
      - "${QDRANT_EXTERNAL_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    networks:
      - ai-discovery
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  ai-discovery:
    driver: bridge
    name: ai_discovery_network